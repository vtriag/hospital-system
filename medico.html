<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atendimento Médico</title>
  <!-- Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Iconify CDN -->
  <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
</head>
<body class="min-h-screen flex flex-col bg-gray-100 text-gray-800 font-poppins">

  <header class="bg-blue-600 text-white py-6 shadow-md">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6">
      <h1 class="text-2xl font-bold">
        <a href="/">
          <img src="images/logo.svg" alt="Logo" class="h-10" />
        </a>
      </h1>
      <nav class="hidden md:flex space-x-6 text-white font-semibold text-sm">
        <a href="index.html" class="hover:text-gray-300">CADASTRO</a>
        <a href="triagem.html" class="hover:text-gray-300">TRIAGEM</a>
        <a href="fila.html" class="hover:text-gray-300">SALA DE ESPERA</a>
        <a href="medico.html" class="hover:text-gray-300">ATENDIMENTO MÉDICO</a>
      </nav>
      <!-- Mobile menu button -->
      <button id="menu-btn" class="md:hidden text-white text-3xl focus:outline-none">
        <span id="icon" class="iconify" data-icon="mdi:menu" data-inline="false"></span>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-blue-600 px-6 py-4 origin-top transform scale-y-0 transition-transform duration-300">
      <ul class="flex flex-col gap-4 text-white font-semibold text-base">
        <li><a href="index.html" class="hover:text-gray-300">CADASTRO</a></li>
        <li><a href="triagem.html" class="hover:text-gray-300">TRIAGEM</a></li>
        <li><a href="fila.html" class="hover:text-gray-300">SALA DE ESPERA</a></li>
        <li><a href="medico.html" class="hover:text-gray-300">ATENDIMENTO MÉDICO</a></li>
      </ul>
    </div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto p-6 w-full">

    <section>
      <h2 class="text-4xl font-semibold text-blue-600 mb-6">Atendimento Médico</h2>
      <p class="mb-8 text-lg text-gray-700">
        Visualize os pacientes já triados e aguardando a chamada para atendimento.
      </p>
    </section>

    <section class="max-w-md mx-auto mb-10">
      <h3 class="text-2xl font-semibold text-blue-600 mb-4 text-center">Paciente em atendimento</h3>
      <div
        id="pacienteEmAtendimento"
        class="bg-blue-50 bg-opacity-50 rounded-xl border border-blue-400 shadow-sm p-4 flex items-center gap-3 text-blue-900 font-semibold text-lg"
      >
        <!-- Aqui o JS vai colocar o conteúdo com nome e bolinha colorida -->
        Nenhum paciente em atendimento
      </div>
      <button
        id="finalizarAtendimento"
        disabled
        class="hidden mt-4 w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
        type="button"
      >
        Finalizar atendimento
      </button>
    </section>    

    <section
      id="pacientesFila"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 px-6 max-w-6xl mx-auto mt-10"
    >
      <!-- A fila de pacientes aparecerá aqui pelo JS -->
    </section>
  </main>

  <footer class="bg-blue-600 text-center py-4 mt-10 text-white text-sm">
    © 2025 Capacita Brasil
  </footer>

  <script src="medico.js"></script>
  <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>

  <script>
    const btn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const icon = document.getElementById('icon');
    let isOpen = false;

    btn.addEventListener('click', () => {
      isOpen = !isOpen;

      if (isOpen) {
        mobileMenu.classList.remove('hidden');
        setTimeout(() => {
          mobileMenu.classList.remove('scale-y-0');
          mobileMenu.classList.add('scale-y-100');
        }, 10);
        icon.dataset.icon = 'mdi:close';
      } else {
        mobileMenu.classList.remove('scale-y-100');
        mobileMenu.classList.add('scale-y-0');
        setTimeout(() => {
          mobileMenu.classList.add('hidden');
        }, 300);
        icon.dataset.icon = 'mdi:menu';
      }
    });

    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          },
        },
      },
    };
  </script>
</body>
</html>
